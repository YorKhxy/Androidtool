<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-base); padding: 18px 22px; display: flex; gap: 12px; }
  .card { flex: 1; background: var(--bg-panel); border: 1px solid var(--border-subtle);
    border-radius: var(--r-md); padding: 13px 15px; }
  .top { display: flex; align-items: center; gap: 7px; color: var(--fg-tertiary);
    font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  .top [data-lucide] { width: 14px; height: 14px; }
  .v { font-family: var(--font-mono); font-size: 26px; font-weight: 600; color: var(--fg-primary);
    font-variant-numeric: tabular-nums; margin: 10px 0 2px; }
  .v small { font-size: 13px; color: var(--fg-tertiary); font-weight: 500; }
  .spark { height: 26px; display: flex; align-items: flex-end; gap: 2px; margin-top: 6px; }
  .spark i { flex: 1; border-radius: 1px; }
</style>
</head>
<body class="adm">
  <div class="card">
    <div class="top" style="color:var(--chart-fps)"><i data-lucide="gauge"></i>FPS</div>
    <div class="v" style="color:var(--accent)">60 <small>fps</small></div>
    <div class="spark">
      <i style="height:80%;background:var(--chart-fps)"></i><i style="height:95%;background:var(--chart-fps)"></i><i style="height:70%;background:var(--chart-fps)"></i><i style="height:100%;background:var(--chart-fps)"></i><i style="height:55%;background:var(--chart-jank)"></i><i style="height:90%;background:var(--chart-fps)"></i><i style="height:100%;background:var(--chart-fps)"></i><i style="height:85%;background:var(--chart-fps)"></i>
    </div>
  </div>
  <div class="card">
    <div class="top" style="color:var(--chart-cpu)"><i data-lucide="cpu"></i>CPU</div>
    <div class="v">23.4 <small>%</small></div>
    <div class="spark">
      <i style="height:40%;background:var(--chart-cpu)"></i><i style="height:55%;background:var(--chart-cpu)"></i><i style="height:48%;background:var(--chart-cpu)"></i><i style="height:62%;background:var(--chart-cpu)"></i><i style="height:38%;background:var(--chart-cpu)"></i><i style="height:50%;background:var(--chart-cpu)"></i><i style="height:44%;background:var(--chart-cpu)"></i><i style="height:58%;background:var(--chart-cpu)"></i>
    </div>
  </div>
  <div class="card">
    <div class="top" style="color:var(--chart-mem)"><i data-lucide="memory-stick"></i>内存</div>
    <div class="v">418 <small>MB</small></div>
    <div class="spark">
      <i style="height:50%;background:var(--chart-mem)"></i><i style="height:54%;background:var(--chart-mem)"></i><i style="height:60%;background:var(--chart-mem)"></i><i style="height:64%;background:var(--chart-mem)"></i><i style="height:68%;background:var(--chart-mem)"></i><i style="height:70%;background:var(--chart-mem)"></i><i style="height:72%;background:var(--chart-mem)"></i><i style="height:76%;background:var(--chart-mem)"></i>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
