<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-base); padding: 22px 24px; }
  .scale { display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .bar { background: var(--accent); height: 14px; border-radius: 2px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); width: 110px; }
  .meta b { color: var(--fg-primary); font-weight: 600; }
</style>
</head>
<body class="adm">
  <div class="scale">
    <div class="row"><div class="meta"><b>sp-2</b> · 4px</div><div class="bar" style="width:4px"></div></div>
    <div class="row"><div class="meta"><b>sp-4</b> · 8px</div><div class="bar" style="width:8px"></div></div>
    <div class="row"><div class="meta"><b>sp-5</b> · 12px</div><div class="bar" style="width:12px"></div></div>
    <div class="row"><div class="meta"><b>sp-6</b> · 16px</div><div class="bar" style="width:16px"></div></div>
    <div class="row"><div class="meta"><b>sp-7</b> · 20px</div><div class="bar" style="width:20px"></div></div>
    <div class="row"><div class="meta"><b>sp-8</b> · 24px</div><div class="bar" style="width:24px"></div></div>
    <div class="row"><div class="meta"><b>sp-9</b> · 32px</div><div class="bar" style="width:32px"></div></div>
  </div>
</body>
</html>
