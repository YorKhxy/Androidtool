<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-base); padding: 22px 26px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 7px 0;
    border-bottom: 1px solid var(--border-subtle); }
  .row:last-child { border-bottom: 0; }
  .meta { width: 132px; flex: none; color: var(--fg-tertiary);
    font-family: var(--font-mono); font-size: 11px; }
  .spec { color: var(--fg-primary); }
</style>
</head>
<body class="adm">
  <div class="row"><div class="meta">display · 20/600</div><div class="spec" style="font-size:var(--fs-display);line-height:var(--lh-display);font-weight:600">安卓设备监控 Performance</div></div>
  <div class="row"><div class="meta">h2 · 16/600</div><div class="spec" style="font-size:var(--fs-h2);font-weight:600">实时性能 · Live Metrics</div></div>
  <div class="row"><div class="meta">h3 · 14/600</div><div class="spec" style="font-size:var(--fs-h3);font-weight:600">已连接设备 Connected devices</div></div>
  <div class="row"><div class="meta">body · 13/400</div><div class="spec" style="font-size:var(--fs-body);color:var(--fg-secondary)">插入手机即可在电脑上投屏、抓日志、看性能。Plug in to mirror, log, and profile.</div></div>
  <div class="row"><div class="meta">sm · 12/400</div><div class="spec" style="font-size:var(--fs-sm);color:var(--fg-secondary)">支持 USB 与 WiFi 连接，传输可断点续传。</div></div>
  <div class="row"><div class="meta">label · 11/600</div><div class="spec adm-label">设备信息 · DEVICE INFO</div></div>
</body>
</html>
