<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; background: var(--bg-base); padding: 20px 24px; }
  .row { display: flex; gap: 9px; align-items: center; margin-bottom: 11px; flex-wrap: wrap; }
  .row:last-child { margin-bottom: 0; }
  .btn { display: inline-flex; align-items: center; gap: 6px; height: 30px; padding: 0 14px;
    border-radius: var(--r-sm); font-size: 13px; font-weight: 500; border: 1px solid transparent;
    cursor: pointer; font-family: var(--font-sans); }
  .primary { background: var(--accent); color: #fff; }
  .secondary { background: var(--bg-elevated); color: var(--fg-primary); border-color: var(--border-default); }
  .o-green { background: transparent; color: var(--success); border-color: var(--success); }
  .o-amber { background: transparent; color: var(--warning); border-color: var(--warning); }
  .o-red { background: transparent; color: var(--danger); border-color: var(--danger); }
  .o-blue { background: transparent; color: var(--accent); border-color: var(--accent); }
  .ctl { height: 26px; padding: 0 11px; font-size: 12px; border-radius: var(--r-sm);
    background: var(--bg-elevated); border: 1px solid var(--border-default); }
  .file { background: var(--bg-elevated); border: 1px solid var(--border-default); color: var(--fg-primary); }
  [data-lucide] { width: 15px; height: 15px; }
  .gold [data-lucide] { color: var(--gold); }
</style>
</head>
<body class="adm">
  <div class="row">
    <button class="btn primary">连接</button>
    <button class="btn primary">选择 APK</button>
    <button class="btn secondary">刷新设备</button>
    <button class="btn secondary">连接 USB</button>
    <button class="btn file gold"><i data-lucide="folder"></i>文件管理</button>
  </div>
  <div class="row">
    <button class="btn o-green">启动</button>
    <button class="btn o-amber">关闭</button>
    <button class="btn o-red">卸载</button>
    <button class="btn o-red">断开设备</button>
    <button class="btn o-blue">快速连接</button>
  </div>
  <div class="row">
    <button class="btn ctl">息屏</button>
    <button class="btn ctl" style="color:var(--success);border-color:var(--success)">唤醒</button>
    <button class="btn ctl">解锁</button>
    <button class="btn ctl" style="color:var(--danger);border-color:var(--danger)">重启</button>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
