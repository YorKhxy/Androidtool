<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>安卓设备监控 · UI Kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { height: 100%; margin: 0; }
  body { background: #05060d; overflow: hidden; }
  #root { height: 100vh; }

  .icon { display: inline-flex; align-items: center; justify-content: center; flex: none; }
  .icon svg { width: 100%; height: 100%; stroke-width: 2; }

  /* ---- Window chrome ---- */
  .win { height: 100vh; display: flex; flex-direction: column; background: var(--bg-base); overflow: hidden; }
  .titlebar { height: 30px; flex: none; display: flex; align-items: center; gap: 8px;
    padding: 0 0 0 12px; background: #101220; border-bottom: 1px solid var(--border-subtle); }
  .titlebar .tt { font-size: 12px; color: var(--fg-tertiary); }
  .titlebar .tt b { color: var(--fg-secondary); font-weight: 500; }
  .wc { margin-left: auto; display: flex; }
  .wc .wb { width: 44px; height: 30px; display: flex; align-items: center; justify-content: center; color: var(--fg-tertiary); }
  .wc .wb:hover { background: var(--bg-hover); color: var(--fg-primary); }
  .wc .wb.close:hover { background: var(--danger); color: #fff; }
  .wc .wb .icon { width: 14px; height: 14px; }

  /* ---- App header ---- */
  .appbar { height: 56px; flex: none; display: flex; align-items: center; gap: 12px;
    padding: 0 22px; background: var(--bg-base); border-bottom: 1px solid var(--border-subtle); }
  .appbar .title { font-size: 20px; font-weight: 700; color: var(--fg-primary); }
  .ver { font-family: var(--font-mono); font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: none; }
  .ver:hover { text-decoration: underline; }

  /* ---- Layout ---- */
  .main { flex: 1; display: flex; min-height: 0; }
  .sidebar { width: 360px; flex: none; background: var(--bg-sidebar); border-right: 1px solid var(--border-subtle);
    overflow-y: auto; padding: 16px; }
  .stage { flex: 1; min-width: 0; padding: 16px; display: flex; }
  .panel { flex: 1; min-width: 0; background: var(--bg-panel); border: 1px solid var(--border-subtle);
    border-radius: var(--r-md); display: flex; flex-direction: column; overflow: hidden; }

  /* scrollbars */
  .sidebar::-webkit-scrollbar, .scroll::-webkit-scrollbar { width: 10px; height: 10px; }
  .sidebar::-webkit-scrollbar-thumb, .scroll::-webkit-scrollbar-thumb {
    background: var(--border-default); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  .sidebar::-webkit-scrollbar-thumb:hover, .scroll::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  /* ---- Top tabs ---- */
  .tabs { display: flex; gap: 2px; padding: 0 10px; border-bottom: 1px solid var(--border-subtle); flex: none; }
  .tab { display: inline-flex; align-items: center; gap: 7px; height: 46px; padding: 0 17px;
    font-size: 14px; font-weight: 500; color: var(--fg-tertiary); cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color var(--dur-fast); }
  .tab:hover { color: var(--fg-secondary); }
  .tab.active { color: var(--accent); font-weight: 600; border-bottom-color: var(--accent); }
  .tab .icon { width: 16px; height: 16px; }

  /* ---- Shared primitives ---- */
  .btn { display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 15px;
    border-radius: var(--r-sm); font-size: 13px; font-weight: 500; border: 1px solid transparent;
    cursor: pointer; font-family: var(--font-sans); white-space: nowrap;
    transition: background var(--dur-fast), border-color var(--dur-fast), color var(--dur-fast); }
  .btn .icon { width: 15px; height: 15px; }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn.primary:active { background: var(--accent-press); }
  .btn.secondary { background: var(--bg-elevated); color: var(--fg-primary); border-color: var(--border-default); }
  .btn.secondary:hover { border-color: var(--border-strong); background: var(--bg-active); }
  .btn.ghost { background: transparent; color: var(--fg-secondary); }
  .btn.ghost:hover { background: var(--bg-hover); color: var(--fg-primary); }
  .btn.outline { background: transparent; }
  .btn.o-green { color: var(--success); border-color: var(--success); }
  .btn.o-green:hover { background: var(--success-soft); }
  .btn.o-amber { color: var(--warning); border-color: var(--warning); }
  .btn.o-amber:hover { background: var(--warning-soft); }
  .btn.o-red { color: var(--danger); border-color: var(--danger); }
  .btn.o-red:hover { background: var(--danger-soft); }
  .btn.o-blue { color: var(--accent); border-color: var(--accent); }
  .btn.o-blue:hover { background: var(--accent-soft); }
  .btn.iconbtn { width: 32px; padding: 0; justify-content: center; background: var(--bg-elevated);
    border-color: var(--border-default); color: var(--fg-secondary); }
  .btn.iconbtn:hover { color: var(--fg-primary); border-color: var(--border-strong); }
  .btn.sm { height: 30px; padding: 0 12px; font-size: 12.5px; }
  .btn.sm.iconbtn { width: 30px; }
  .btn:disabled { background: var(--bg-elevated); color: var(--fg-disabled); border-color: var(--border-subtle); cursor: default; }

  .field { display: flex; align-items: center; gap: 8px; height: 34px; padding: 0 11px;
    background: var(--bg-input); border: 1px solid var(--border-default); border-radius: var(--r-sm);
    color: var(--fg-secondary); font-size: 13px; }
  .field:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .field .icon { width: 15px; height: 15px; color: var(--fg-tertiary); }
  .field input { background: none; border: 0; outline: 0; color: var(--fg-primary); font-size: 13px;
    font-family: var(--font-sans); flex: 1; min-width: 0; }
  .field input::placeholder { color: var(--fg-tertiary); }
  select.nat { height: 34px; background: var(--bg-input); border: 1px solid var(--border-default);
    border-radius: var(--r-sm); color: var(--fg-primary); font-size: 13px; padding: 0 8px; font-family: var(--font-sans); }

  .badge { display: inline-flex; align-items: center; gap: 5px; height: 22px; padding: 0 9px;
    border-radius: var(--r-pill); font-size: 11.5px; font-weight: 500; }
  .badge .dot { width: 7px; height: 7px; border-radius: 50%; }
  .badge .icon { width: 12px; height: 12px; }
  .tag { display: inline-flex; align-items: center; height: 20px; padding: 0 7px; border-radius: var(--r-xs);
    font-size: 11px; font-family: var(--font-mono); background: var(--bg-elevated);
    color: var(--fg-secondary); border: 1px solid var(--border-default); }

  .seclabel { font-size: 13px; color: var(--fg-tertiary); font-weight: 500; margin: 4px 0 10px; }
  .link { color: var(--accent); cursor: pointer; }
  .link:hover { text-decoration: underline; }

  /* ---- panel content header (toolbars inside tabs) ---- */
  .ph { display: flex; align-items: center; gap: 12px; padding: 14px 18px; }
  .ph h2 { font-size: 16px; }
  .ph .sp { flex: 1; }
  .scroll { overflow: auto; }
  .empty { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; color: var(--fg-tertiary); }
  .empty .icon { width: 40px; height: 40px; color: var(--fg-disabled); }
  .empty .et { font-size: 14px; color: var(--fg-secondary); }
  .empty .es { font-size: 12px; }

  /* card sub-panels */
  .subpanel { background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: var(--r-md); }

  /* scrim/modal */
  .scrim { position: fixed; inset: 0; background: var(--bg-scrim); display: flex; align-items: center;
    justify-content: center; z-index: 50; }
  .modal { background: var(--bg-panel); border: 1px solid var(--border-default); border-radius: var(--r-lg);
    box-shadow: var(--sh-modal); overflow: hidden; }
  .screen-head { height: 52px; flex: none; display: flex; align-items: center; gap: 12px; padding: 0 18px;
    border-bottom: 1px solid var(--border-subtle); }
  .screen-head h2 { font-size: 15px; }
  .screen-head .sub { color: var(--fg-tertiary); font-size: 12px; }
  .screen-head .sp { flex: 1; }
  .screen { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .screen-body { flex: 1; min-height: 0; overflow: auto; }
  .screen-body::-webkit-scrollbar { width: 10px; height: 10px; }
  .screen-body::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
</style>
</head>
